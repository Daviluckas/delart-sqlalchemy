{% extends 'base.html' %}
{% block title %}Login - Delart{% endblock %}
{% block content %}
<div class="auth">
    <h1>Entrar</h1>
    <form method="POST" action="{{ url_for('login') }}">
        <label>Nome de usuário
            <input type="text" name="nome" required autofocus>
        </label>
        <label>Senha
            <input type="password" name="senha" required>
        </label>
        <button type="submit" class="btn">Entrar</button>
    </form>
    <p class="link-abaixo">Não tem conta? <a href="{{ url_for('registro') }}">Cadastre-se</a></p>
</div>
{% endblock %}
